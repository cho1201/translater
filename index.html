<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VALORANT JP 번역기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117; color: #e5e5e5;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .wrapper { width: 100%; max-width: 650px; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.8rem; color: #ff4655; letter-spacing: 2px; }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
    .tab {
      flex: 1; padding: 12px; border: 1px solid #2a2d35; border-radius: 8px;
      background: #1a1d26; color: #888; cursor: pointer; transition: 0.2s;
    }
    .tab.active { background: #ff4655; color: white; border-color: #ff4655; font-weight: bold; }

    .card { background: #1a1d26; border: 1px solid #2a2d35; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    label { font-size: 12px; color: #ff4655; font-weight: 600; display: block; margin-bottom: 8px; }
    
    textarea {
      width: 100%; background: #0f1117; border: 1px solid #2a2d35;
      border-radius: 8px; color: #e5e5e5; font-size: 16px;
      padding: 12px; resize: vertical; min-height: 100px; outline: none;
    }
    textarea:focus { border-color: #ff4655; }

    .phrase-section { margin-top: 15px; border-top: 1px solid #2a2d35; padding-top: 15px; }
    .category-title { font-size: 11px; color: #666; margin-bottom: 6px; display: block; }
    .quick-phrases { display: flex; flex-wrap: wrap; gap: 6px; }
    
    .phrase {
      font-size: 12px; padding: 5px 10px; border: 1px solid #333;
      border-radius: 4px; background: #222; color: #ccc; cursor: pointer;
    }
    .phrase:hover { border-color: #ff4655; color: #ff4655; }

    .btn-translate {
      width: 100%; padding: 14px; background: #ff4655; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; margin-top: 15px;
    }

    .result-box {
      background: #0f1117; border: 1px solid #2a2d35; border-radius: 8px;
      padding: 15px; min-height: 60px; font-size: 16px; position: relative;
    }
    .copy-btn {
      position: absolute; top: 10px; right: 10px; padding: 4px 10px; font-size: 11px;
      background: #1a1d26; border: 1px solid #333; color: #aaa; cursor: pointer;
    }

    .ocr-btn {
      width: 100%; padding: 10px; border: 1px dashed #444; background: transparent;
      color: #888; cursor: pointer; border-radius: 8px; margin-top: 10px;
    }
    .ocr-btn:hover { border-color: #ff4655; color: #ff4655; }
    
    .hiragana-box { margin-top: 10px; background: #0f1117; padding: 10px; color: #aaa; font-style: italic; border-left: 3px solid #ff4655; }
    .error { color: #ff4655; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <h1>VALORANT JP TRANSLATOR</h1>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('jp-to-kr', this)">🇯🇵 JP → KR (듣기/사진)</button>
    <button class="tab" onclick="switchTab('kr-to-jp', this)">🇰🇷 KR → JP (말하기)</button>
  </div>

  <div id="tab-jp-to-kr">
    <div class="card">
      <label>일본어 입력 (영어 발음, 히라가나 모두 가능)</label>
      <textarea id="jp-input" placeholder="예: gomennasai 또는 だれにいってんの？"></textarea>
      
      <input type="file" id="image-input" accept="image/*" style="display:none" onchange="uploadImage()">
      <button class="ocr-btn" onclick="document.getElementById('image-input').click()">📷 사진 찍거나 스크린샷 올리기</button>
      <div id="ocr-status" style="font-size:11px; text-align:center; margin-top:5px; color:#ff4655;"></div>

      <button class="btn-translate" onclick="runTranslate('jp-to-kr')">번역하기</button>
    </div>
    <div class="card">
      <label>번역 결과</label>
      <div class="result-box" id="kr-result">해석이 여기에 표시됩니다.</div>
    </div>
  </div>

  <div id="tab-kr-to-jp" style="display:none">
    <div class="card">
      <label>한국어 조합 & 입력</label>
      <textarea id="kr-input" placeholder="단어를 클릭하여 조합하세요..."></textarea>
      
      <div class="phrase-section">
        <div class="category-group">
          <span class="category-title">📍 위치</span>
          <div class="quick-phrases">
            <button class="phrase" onclick="addWord('kr', 'A사이트')">A사이트</button>
            <button class="phrase" onclick="addWord('kr', 'B사이트')">B사이트</button>
            <button class="phrase" onclick="addWord('kr', '미드')">미드</button>
          </div>
        </div>
        <div class="category-group" style="margin-top:10px;">
          <span class="category-title">⚔️ 전략</span>
          <div class="quick-phrases">
            <button class="phrase" onclick="addWord('kr', '가자')">가자</button>
            <button class="phrase" onclick="addWord('kr', '지키자')">세이브</button>
            <button class="phrase" onclick="addWord('kr', '천천히')">천천히</button>
            <button class="phrase" onclick="addWord('kr', '나이스!')">나이스</button>
          </div>
        </div>
      </div>

      <button class="btn-translate" onclick="runTranslate('kr-to-jp')">일본어로 번역</button>
      <button class="phrase" onclick="document.getElementById('kr-input').value=''" style="margin-top:10px; width:100%;">비우기</button>
    </div>
    <div class="card">
      <label>일본어 번역 결과</label>
      <div class="result-box">
        <span id="jp-result">결과가 여기에 표시됩니다.</span>
        <button class="copy-btn" onclick="copyText('jp-result')">복사</button>
      </div>
      <div id="hira-section" style="display:none">
        <label style="margin-top:10px;">히라가나 발음</label>
        <div class="hiragana-box" id="hira-result"></div>
      </div>
    </div>
  </div>
</div>

<script>
  function switchTab(mode, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-jp-to-kr').style.display = mode === 'jp-to-kr' ? '' : 'none';
    document.getElementById('tab-kr-to-jp').style.display = mode === 'kr-to-jp' ? '' : 'none';
  }

  function addWord(lang, word) {
    const input = document.getElementById(lang + '-input');
    input.value += (input.value ? ' ' : '') + word;
    input.focus();
  }

  function copyText(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text);
    alert('복사되었습니다!');
  }

  async function runTranslate(direction) {
    const isJp = direction === 'jp-to-kr';
    const text = document.getElementById(isJp ? 'jp-input' : 'kr-input').value.strip;
    const resultEl = document.getElementById(isJp ? 'kr-result' : 'jp-result');
    
    resultEl.textContent = '번역 중...';
    try {
      const res = await fetch('/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, direction })
      });
      const data = await res.json();
      if (data.error) { resultEl.textContent = data.error; }
      else {
        resultEl.textContent = data.result;
        if (!isJp && data.hiragana) {
          document.getElementById('hira-result').textContent = data.hiragana;
          document.getElementById('hira-section').style.display = '';
        }
      }
    } catch (e) { resultEl.textContent = '서버 오류'; }
  }

  async function uploadImage() {
    const file = document.getElementById('image-input').files[0];
    const status = document.getElementById('ocr-status');
    const resultEl = document.getElementById('kr-result');
    if (!file) return;

    const formData = new FormData();
    formData.append('image', file);
    status.textContent = '이미지 분석 중...';

    try {
      const res = await fetch('/translate-image', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.error) { status.textContent = data.error; }
      else {
        status.textContent = '인식 성공: ' + data.original;
        resultEl.textContent = data.translated;
      }
    } catch (e) { status.textContent = '연결 오류'; }
  }
</script>
</body>
</html>
